# 清洗配置
cleanup:
  # 移除的正则模式
  exclude_patterns:
    - "^#"           # 注释行
    - "^//"          # 注释行
    - "^\\s*$"       # 空行
  # 去重前排序
  sort: true
  # 转换为小写
  lowercase: true
