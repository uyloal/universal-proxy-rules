  # ==================== 网络 & GeoIP ====================
  china:
    name: "China"
    behavior: domain
    urls:
      - "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China_Classical.yaml"
    format: classical
    interval: 86400

  lan:
    name: "LAN"
    behavior: ipcidr
    urls:
      - "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml"
    format: classical
    interval: 86400

# 清洗配置
cleanup:
  # 移除的正则模式
  exclude_patterns:
    - "^#"           # 注释行
    - "^//"          # 注释行
    - "^\\s*$"       # 空行
  # 去重前排序
  sort: true
  # 转换为小写
  lowercase: true
