# 策略组与路由规则配置 (Config-as-Code)
# 完全解耦节点信息，仅定义策略组结构和规则绑定

# 策略组定义
proxy-groups:
  # ========== 核心节点选择 ==========
  - name: "🚀 节点选择"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"
    include-all: true
    default: "⚡ 自动测速"

  - name: "⚡ 自动测速"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Speedtest.png"
    include-all: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true
    timeout: 5000

  - name: "♻️ 故障转移"
    type: fallback
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available.png"
    include-all: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    timeout: 5000

  # ========== 自建节点 ==========
  - name: "🛠️ 自建节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Server.png"
    include-all: true
    filter: "(?i)自建|vps|home|self|dedicated|私有"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # ========== 地区分组 ==========
  - name: "🇭🇰 香港节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🇨🇳 台湾节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png"
    include-all: true
    filter: "(?i)台|tw|taiwan|tai wan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🇯🇵 日本节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"
    include-all: true
    filter: "(?i)日|jp|japan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🇸🇬 新加坡节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"
    include-all: true
    filter: "(?i)新|坡|sg|singapore"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🇺🇸 美国节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"
    include-all: true
    filter: "(?i)美|us|usa|united states|america"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🇪🇺 欧洲节点"
    type: url-test
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_Nations.png"
    include-all: true
    filter: "(?i)英|uk|德|de|法|fr|意|it|荷|nl|瑞|se|西|es|eu|europe|england|germany|france"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # ========== 流媒体服务 ==========
  - name: "🎬 流媒体"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Streaming.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇨🇳 台湾节点"
      - "🇯🇵 日本节点"
      - "🇺🇸 美国节点"
      - "🇸🇬 新加坡节点"
      - "🇪🇺 欧洲节点"
    default: "🚀 节点选择"

  - name: "🎥 Netflix"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇨🇳 台湾节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "🇪🇺 欧洲节点"
    default: "🚀 节点选择"

  - name: "📺 YouTube"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
    default: "🚀 节点选择"

  - name: "🎵 TikTok"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇸🇬 新加坡节点"
    default: "🚀 节点选择"

  - name: "📱 国内流媒体"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/bilibili.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
    default: "DIRECT"

  # ========== AI 服务 ==========
  - name: "🤖 AI 服务"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇯🇵 日本节点"
      - "🇺🇸 美国节点"
      - "🇸🇬 新加坡节点"
      - "🇪🇺 欧洲节点"
    default: "🚀 节点选择"

  # ========== 社交服务 ==========
  - name: "📲 电报消息"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇸🇬 新加坡节点"
      - "♻️ 故障转移"
    default: "🚀 节点选择"

  - name: "🐦 社交媒体"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Twitter.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇺🇸 美国节点"
    default: "🚀 节点选择"

  # ========== 科技 & 云服务 ==========
  - name: "🍎 苹果服务"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
    default: "DIRECT"

  - name: "🔍 谷歌服务"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
      - "🇺🇸 美国节点"
    default: "🚀 节点选择"

  - name: "🐱 GitHub"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
      - "🇭🇰 香港节点"
    default: "🚀 节点选择"

  - name: "Ⓜ️ 微软服务"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "🛠️ 自建节点"
    default: "DIRECT"

  # ========== 游戏平台 ==========
  - name: "🎮 游戏平台"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "🛠️ 自建节点"
    default: "DIRECT"

  # ========== 电商 & 支付 ==========
  - name: "🛒 电商支付"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PayPal.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "🛠️ 自建节点"
    default: "DIRECT"

  # ========== 国内服务 ==========
  - name: "🏠 国内服务"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
      - "🛠️ 自建节点"
    default: "DIRECT"

  # ========== 兜底 ==========
  - name: "🎯 全球直连"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png"
    proxies:
      - "DIRECT"
      - "🚀 节点选择"
    default: "DIRECT"

  - name: "🐟 漏网之鱼"
    type: select
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动测速"
      - "DIRECT"
    default: "🚀 节点选择"

# ========== 规则绑定配置 ==========
# 定义规则如何映射到策略组 (优先级从上到下)
rules:
  # ========== 最高优先级：网络基础 ==========
  # 局域网
  - type: upstream
    upstream: "lan"
    policy: "🎯 全球直连"

  # ========== AI 服务 ==========
  - type: upstream
    upstream: "ai"
    policy: "🤖 AI 服务"

  # ========== 流媒体服务 ==========
  - type: upstream
    upstream: "youtube"
    policy: "📺 YouTube"

  - type: upstream
    upstream: "netflix"
    policy: "🎥 Netflix"

  - type: upstream
    upstream: "disney"
    policy: "🎬 流媒体"

  - type: upstream
    upstream: "hbo"
    policy: "🎬 流媒体"

  - type: upstream
    upstream: "spotify"
    policy: "🎬 流媒体"

  - type: upstream
    upstream: "tiktok"
    policy: "🎵 TikTok"

  - type: upstream
    upstream: "bilibili"
    policy: "📱 国内流媒体"

  - type: upstream
    upstream: "netease-music"
    policy: "📱 国内流媒体"

  - type: upstream
    upstream: "douyin"
    policy: "📱 国内流媒体"

  # ========== 社交服务 ==========
  - type: upstream
    upstream: "telegram"
    policy: "📲 电报消息"

  - type: upstream
    upstream: "twitter"
    policy: "🐦 社交媒体"

  - type: upstream
    upstream: "facebook"
    policy: "🐦 社交媒体"

  - type: upstream
    upstream: "wechat"
    policy: "🏠 国内服务"

  - type: upstream
    upstream: "sina"
    policy: "🏠 国内服务"

  - type: upstream
    upstream: "zhihu"
    policy: "🏠 国内服务"

  - type: upstream
    upstream: "xiaohongshu"
    policy: "🏠 国内服务"

  # ========== 游戏平台 ==========
  - type: upstream
    upstream: "sony"
    policy: "🎮 游戏平台"

  - type: upstream
    upstream: "nintendo"
    policy: "🎮 游戏平台"

  - type: upstream
    upstream: "epic"
    policy: "🎮 游戏平台"

  - type: upstream
    upstream: "steam-cn"
    policy: "🎯 全球直连"

  - type: upstream
    upstream: "steam"
    policy: "🎮 游戏平台"

  - type: upstream
    upstream: "gaming"
    policy: "🎮 游戏平台"

  # ========== 科技 & 云服务 ==========
  - type: upstream
    upstream: "github"
    policy: "🐱 GitHub"

  - type: upstream
    upstream: "google"
    policy: "🔍 谷歌服务"

  - type: upstream
    upstream: "microsoft"
    policy: "Ⓜ️ 微软服务"

  - type: upstream
    upstream: "apple"
    policy: "🍎 苹果服务"

  # ========== 电商 & 支付 ==========
  - type: upstream
    upstream: "paypal"
    policy: "🛒 电商支付"

  - type: upstream
    upstream: "amazon"
    policy: "🛒 电商支付"

  # ========== 国内服务 ==========
  - type: upstream
    upstream: "baidu"
    policy: "🏠 国内服务"

  - type: upstream
    upstream: "douban"
    policy: "🏠 国内服务"

  # ========== 网络 & GeoIP ==========
  - type: upstream
    upstream: "china"
    policy: "🎯 全球直连"

  - type: upstream
    upstream: "global"
    policy: "🚀 节点选择"

  # GEOIP 中国
  - type: geoip
    country: "CN"
    policy: "🎯 全球直连"

  # ========== 兜底规则 ==========
  - type: match
    policy: "🐟 漏网之鱼"
