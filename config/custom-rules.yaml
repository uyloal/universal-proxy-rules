# 自定义规则配置
# 支持合并到 upstream 或单独成组
#
# 字段说明:
#   name: 显示名称 (必填)
#   behavior: 规则行为 domain/ipcidr/classical (默认：domain)
#   rules: 规则列表 (必填)
#   merge_into: 合并到指定 upstream (可选，不指定则单独成组)
#   interval: 更新间隔 (仅单独成组时有效，默认：86400)

custom_rules:
  # 端口直连规则（解决 fake-ip 导致的连接问题）
  port-direct:
    name: "Port Direct"
    behavior: classical
    rules:
      - "DST-PORT,22,DIRECT"
      - "DST-PORT,23,DIRECT"
      - "DST-PORT,143,DIRECT"
      - "DST-PORT,465,DIRECT"
      - "DST-PORT,587,DIRECT"
      - "DST-PORT,993,DIRECT"
      - "DST-PORT,995,DIRECT"
      - "DST-PORT,3389,DIRECT"
      - "DST-PORT,5900,DIRECT"
      - "DST-PORT,6443,DIRECT"
      - "DST-PORT,9418,DIRECT"
