[Host]
# ==================== 本地 DNS 映射 ====================
localhost = 127.0.0.1

[URL Rewrite]
# ==================== URL 重写规则 ====================
# 用于广告过滤、强制 HTTPS 等
# 格式：pattern replacement [type: header|reject|redirect]

[MITM]
# ==================== HTTPS 解密配置（高级）====================
# ⚠️ 警告：启用 MITM 会解密 HTTPS 流量，存在隐私风险
# 仅在需要过滤 HTTPS 广告或重写 HTTPS 请求时启用
enable = false
# hostname 格式：域名通配符，多个用逗号分隔
# ⚠️ 以下为占位符，启用 MITM 前必须替换为真实目标域名
# 示例：*.google.com, *.facebook.com
# hostname = *.example.com
# ca-p12 = base64-encoded-p12
# ca-passphrase = password
