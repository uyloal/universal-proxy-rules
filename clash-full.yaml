mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
enable-process: true
find-process-mode: strict
global-client-fingerprint: chrome
log-level: warning
keep-alive-idle: 600
keep-alive-interval: 15
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  cache-algorithm: arc
  respect-rules: true
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
