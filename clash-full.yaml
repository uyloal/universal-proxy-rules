    - "*.localdomain"
    - "*.example"
    - "*.localhost"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time-ios.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - +.pool.ntp.org
    - msftconnecttest.com
    - msftncsi.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - localhost.ptlogin2.qq.com
    - "*.id.qq.com"
    - "*.ptlogin2.qq.com"
    - captive.apple.com
    - gsp1.apple.com
    - www.apple.com
    - www.apple.com.cn
    - detectportal.firefox.com
    - connectivitycheck.gstatic.com
    - connectivitycheck.android.com
    - clients3.google.com
    - clients4.google.com
    - connectivitycheck.cbg-dev-mx-apple.com
    - wifi.vivo.com.cn
    - wifi.miwifi.com
    - www.gstatic.com
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
    - ::/128
    - ::1/128
    - ::ffff:0:0/96
    - ::ffff:0:0:0/96
    - 64:ff9b::/96
    - 100::/64
    - 2001::/32
    - 2001:20::/28
    - 2001:db8::/32
    - 2002::/16
    - fc00::/7
    - fe80::/10
    - ff00::/8
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.1.1.1:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.x.com
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  strict-route: false
  device: utun123
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - +.v2ex.com
    - +.netflix.com
    - +.hbomax.com
  skip-domain:
    - +.apple.com
    - +.icloud.com
    - +.icloud-content.com
    - +.cdn-apple.com
    - +.mzstatic.com
    - Mijia Cloud
listeners:
  - name: mixed-in
    type: mixed
    port: 7890
    listen: 0.0.0.0
profile:
  store-selected: true
  store-fake-ip: true
proxy-groups:
