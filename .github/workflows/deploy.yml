name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate configurations
        run: pnpm generate

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +"%Y%m%d-%H%M%S")
          COMMIT_SHA=$(git rev-parse --short HEAD)

          # 打包 output 目录
          cd output && zip -r ../proxy-rules-${VERSION}.zip . && cd ..

          # 创建 release
          gh release create "v${VERSION}" \
            --title "Proxy Rules ${VERSION}" \
            --notes "Auto-generated rules update

          - Commit: ${COMMIT_SHA}
          - Generated at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Files

          - \`clash-full.yaml\` - Complete Clash Meta/Mihomo config template (no proxies)
          - \`rules/*.yaml\` - Standalone rule sets
          - \`rules/*.txt\` - Plain text rule sets
          - \`metadata.json\` - Build metadata

          ## Usage

          Download ZIP or use raw links above.
          Inject your own proxy nodes via Merge/Script/Sub-Store." \
            --target main

          # 上传产物到 release
          gh release upload "v${VERSION}" proxy-rules-${VERSION}.zip

      - name: Push to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 保存 output
          cp -r output /tmp/output
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # 切换到 release 分支
          git fetch origin release || true
          git checkout release 2>/dev/null || git checkout -b release

          # 清空旧内容，保留 .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # 复制新内容
          cp -r /tmp/output/* .

          # 创建 README
          cat > README.md << 'EOF'
          # Proxy Rules Generated Configurations

          此分支由 GitHub Actions 自动生成，请勿手动编辑。

          ## 文件说明

          - `clash-full.yaml` - 完整的 Clash Meta/Mihomo 配置模板 (无节点)
          - `rules/*.yaml` - 独立规则集文件
          - `rules/*.txt` - 纯文本格式规则集
          - `metadata.json` - 构建元数据

          ## 使用方法

          ### 直接引用链接

          ```
          https://raw.githubusercontent.com/${{ github.repository }}/release/clash-full.yaml
          https://raw.githubusercontent.com/${{ github.repository }}/release/rules/ai.txt
          ```

          ### Clash Verge Rev / OpenClash / Stash

          在客户端中使用 `clash-full.yaml` 作为配置模板，
          通过 Merge 或 Script 方式注入本地节点订阅。

          ## 上游配置仓库

          https://github.com/${{ github.repository }}
          EOF

          # 提交
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generated rules [${COMMIT_SHA}]

          Source commit: ${COMMIT_SHA}
          Source message: ${COMMIT_MSG}"
            git push origin release
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-configs
          path: output/
          retention-days: 7
