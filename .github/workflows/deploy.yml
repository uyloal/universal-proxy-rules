name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

# 防止多个 workflow 同时运行导致冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # 预设仓库名供后续步骤使用
  REPO_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate configurations
        run: pnpm generate

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +"%Y%m%d-%H%M%S")
          COMMIT_SHA=$(git rev-parse --short HEAD)

          # 读取 metadata.json 获取统计信息
          TOTAL_RULES=$(jq -r '[.upstreams | to_entries | .[].value] | add' output/metadata.json)
          UPSTREAM_COUNT=$(jq -r '.upstreams | length' output/metadata.json)

          # 打包 output 目录
          cd output && zip -r ../proxy-rules-${VERSION}.zip . && cd ..

          # 创建 release
          gh release create "v${VERSION}" \
            --title "Proxy Rules ${VERSION}" \
            --notes "🔄 Auto-generated rules update

          ## Build Info

          - **Commit:** ${COMMIT_SHA}
          - **Generated at:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Total Rules:** ${TOTAL_RULES}
          - **Rule Categories:** ${UPSTREAM_COUNT}

          ## Files

          | File | Description |
          |------|-------------|
          | \`clash-full.yaml\` | Clash Meta/Mihomo config template |
          | \`shadowrocket-full.conf\` | Shadowrocket config template |
          | \`rules/*.yaml\` | Standalone rule sets (YAML format) |
          | \`rules/*.list\` | Standalone rule sets (List format for Shadowrocket) |
          | \`metadata.json\` | Build metadata & statistics |

          ## Usage

          Download ZIP or use raw links above.
          Inject your own proxy nodes via Merge/Script/Sub-Store.

          ### Quick Links

          - Clash: https://raw.githubusercontent.com/${REPO_NAME}/release/clash-full.yaml
          - Shadowrocket: https://raw.githubusercontent.com/${REPO_NAME}/release/shadowrocket-full.conf" \
            --target main

          # 上传产物到 release
          gh release upload "v${VERSION}" proxy-rules-${VERSION}.zip

          # 清理临时 ZIP 文件
          rm proxy-rules-${VERSION}.zip

      - name: Push to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 保存 output
          cp -r output /tmp/output
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # 切换到 release 分支
          git fetch origin release || true
          git checkout release 2>/dev/null || git checkout -b release

          # 清空旧内容，保留 .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # 复制新内容
          cp -r /tmp/output/* .

          # 创建 README（使用环境变量 REPO_NAME）
          cat > README.md << EOF
          # Proxy Rules Generated Configurations

          此分支由 GitHub Actions 自动生成，请勿手动编辑。

          ## 文件说明

          - \`clash-full.yaml\` - 完整的 Clash Meta/Mihomo 配置模板 (无节点)
          - \`shadowrocket-full.conf\` - 完整的 Shadowrocket 配置模板 (无节点)
          - \`rules/*.yaml\` - 独立规则集文件 (YAML 格式，供 Clash 使用)
          - \`rules/*.list\` - 独立规则集文件 (纯文本格式，供 Shadowrocket 使用)
          - \`metadata.json\` - 构建元数据

          ## 使用方法

          ### 直接引用链接

          \`\`\`
          https://raw.githubusercontent.com/${REPO_NAME}/release/clash-full.yaml
          https://raw.githubusercontent.com/${REPO_NAME}/release/shadowrocket-full.conf
          https://raw.githubusercontent.com/${REPO_NAME}/release/rules/ai.yaml
          https://raw.githubusercontent.com/${REPO_NAME}/release/rules/ai.list
          \`\`\`

          ### Clash Verge Rev / OpenClash / Stash

          在客户端中使用 \`clash-full.yaml\` 作为配置模板，
          通过 Merge 或 Script 方式注入本地节点订阅。

          ### Shadowrocket

          下载 \`shadowrocket-full.conf\` 文件到本地，
          通过 Shadowrocket 的"配置"→"导入"功能加载。
          节点需在客户端中手动添加或通过订阅导入。

          ## 上游配置仓库

          https://github.com/${REPO_NAME}
          EOF

          # 提交
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generated rules [${COMMIT_SHA}]

          Source commit: ${COMMIT_SHA}
          Source message: ${COMMIT_MSG}"
            git push origin release
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-configs
          path: output/
          retention-days: 30
