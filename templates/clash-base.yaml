# Clash Meta / Mihomo 基础配置模板
# ⚠️ 此模板不包含任何节点信息，仅含网络底层配置
# 节点将在客户端本地通过 Merge/Override 或 Sub-Store 注入

# 端口配置
mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
bind-address: '*'
ipv6: true
unified-delay: true

# 日志级别
log-level: warning

# 外部控制器 (Web UI)
external-controller: 127.0.0.1:9090

# TCP Keepalive
tcp-concurrent: true
enable-process: true
find-process-mode: strict

# 性能优化
keep-alive-idle: 600
keep-alive-interval: 15

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.localhost'
    - '*.local'
    - '*.home.arpa'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'time-ios.apple.com'
    - 'time1.*.com'
    - 'time2.*.com'
    - 'time3.*.com'
    - 'time4.*.com'
    - 'time5.*.com'
    - 'time6.*.com'
    - 'time7.*.com'
    - 'ntp.*.com'
    - 'ntp1.*.com'
    - 'ntp2.*.com'
    - 'ntp3.*.com'
    - 'ntp4.*.com'
    - 'ntp5.*.com'
    - 'ntp6.*.com'
    - 'ntp7.*.com'
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - 'localhost.ptlogin2.qq.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.1.1.1:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

# TUN 模式配置 (macOS/Linux/Windows)
tun:
  enable: true
  stack: system # macOS 推荐 system，Windows/Linux 推荐 gvisor
  dns-hijack:
    - 0.0.0.0:53
    - 'tcp://0.0.0.0:53'
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  # macOS 专用
  device: utun123
  strict-route: false
  # endpoint-independent-nat: false

# 嗅探配置
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - +.apple.com
    - +.icloud.com

# 入站配置
listeners:
  - name: mixed-in
    type: mixed
    port: 7890
    listen: 0.0.0.0

# 插件配置 (可选)
profile:
  store-selected: true
  store-fake-ip: true
